<script>
// ============================================================
// CONFIG GOOGLE SHEETS
// ============================================================
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROdE0kaeIuLM9h0DZutIAu0hpnJgUncB67aChQbf7YdM1p_aqqh65_SVQ_3vbLsmWQ9H19SKj0AuyC/pub?gid=282220580&single=true&output=csv';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWT_2eeTwgEkI8BLQWxghtGyH2QbqltwHjyu19d392Qm93RK4o0IDQ118zyYp54hld/exec';

// ============================================================
// DATA
// ============================================================
let allData = [];
let currentTab = 'todos';
let currentSort = { col: null, dir: 1 };
let currentPage = 1;
const PAGE_SIZE = 15;
let filteredData = [];
let selectedIds = new Set();
let pendingBajaId = null;
let pendingEditId = null;
let drawerEmpresaActual = null;

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function parseResponseAsJson(resp) {
  const text = await resp.text();
  try {
    return JSON.parse(text);
  } catch (error) {
    throw new Error(text || 'Respuesta inválida del servidor');
  }
}

async function postToAppsScript(payload) {
  const resp = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain;charset=utf-8'
    },
    body: JSON.stringify(payload)
  });

  const result = await parseResponseAsJson(resp);

  if (!resp.ok) {
    throw new Error(result?.error || 'Error HTTP al guardar');
  }

  if (result && result.ok === false) {
    throw new Error(result.error || 'Error al guardar en Google Sheets');
  }

  return result;
}

async function getFromAppsScript(action, params = {}) {
  const url = new URL(APPS_SCRIPT_URL);
  url.searchParams.set('action', action);

  Object.entries(params).forEach(([key, value]) => {
    url.searchParams.set(key, value ?? '');
  });

  const resp = await fetch(url.toString());
  const result = await parseResponseAsJson(resp);

  if (!resp.ok) {
    throw new Error(result?.error || 'Error HTTP al consultar');
  }

  if (result && result.ok === false) {
    throw new Error(result.error || 'Error al consultar Apps Script');
  }

  return result;
}

function reconstruirFiltros() {
  const mSel = document.getElementById('filterMunicipio');
  const eSel = document.getElementById('filterEstado');

  const municipioActual = mSel.value;
  const estadoActual = eSel.value;

  const munis = [...new Set(allData.map(r => r.municipio).filter(Boolean))].sort();
  const estds = [...new Set(allData.map(r => r.estado).filter(Boolean))].sort();

  mSel.innerHTML = '<option value="">Todos los municipios</option>';
  eSel.innerHTML = '<option value="">Todos los estados</option>';

  munis.forEach(m => {
    const o = document.createElement('option');
    o.value = m;
    o.textContent = m;
    mSel.appendChild(o);
  });

  estds.forEach(e => {
    const o = document.createElement('option');
    o.value = e;
    o.textContent = e;
    eSel.appendChild(o);
  });

  if (munis.includes(municipioActual)) mSel.value = municipioActual;
  if (estds.includes(estadoActual)) eSel.value = estadoActual;
}

function mapRowsFromSheet(rows) {
  const headers = rows[0].map(h => String(h).trim().toLowerCase());

  const idx = (...keys) => {
    for (const key of keys) {
      const i = headers.indexOf(key);
      if (i !== -1) return i;
    }
    return -1;
  };

  return rows.slice(1)
    .filter(r => r.some(c => String(c).trim()))
    .map((r, i) => ({
      id: i + 1,
      empresa: String(r[idx('empresa')] || '').trim(),
      estado: String(r[idx('estado')] || '').trim(),
      municipio: String(r[idx('municipio')] || '').trim(),
      nombre: String(r[idx('nombre')] || '').trim(),
      telefono: String(r[idx('telefono', 'teléfono', 'celular', 'telefono contacto', 'teléfono contacto')] || '').trim(),
      correo: String(r[idx('correo', 'correo electrónico', 'email', 'e-mail')] || '').trim(),
      etapa: String(r[idx('etapa')] || '').trim(),
      fuente: String(r[idx('fuente')] || '').trim(),
      estatus: String(r[idx('estatus')] || '').trim(),
      motivoBaja: String(r[idx('motivo baja')] || '').trim(),
      fechaBaja: String(r[idx('fecha baja')] || '').trim(),
      observaciones: String(r[idx('observaciones')] || '').trim(),
      ultimaActualizacion: String(r[idx('ultima actualización', 'ultima actualizacion')] || '').trim(),
      asignado: String(r[idx('asignado')] || '').trim()
    }));
}

// ============================================================
// LOAD
// ============================================================
async function recargarSheets(showToast = true) {
  if (showToast) toast('Recargando desde Google Sheets...');

  try {
    const resp = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
    if (!resp.ok) throw new Error('No se pudo conectar');

    const text = await resp.text();
    const rows = parseCSV(text);

    if (rows.length > 1) {
      allData = mapRowsFromSheet(rows);
      reconstruirFiltros();
      actualizarKPIs();
      renderCharts();
      filtrarTabla();
      if (showToast) toast(`${allData.length} prospectos actualizados`);
    }
  } catch (error) {
    if (showToast) toast('No se pudo conectar a Google Sheets', true);
    throw error;
  }
}

async function init() {
  document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('es-MX', {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });

  document.getElementById('tableBody').innerHTML =
    `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--gray);">Cargando datos desde Google Sheets...</td></tr>`;

  try {
    const resp = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
    if (!resp.ok) throw new Error('No se pudo conectar');

    const text = await resp.text();
    const rows = parseCSV(text);

    if (rows.length > 1) {
      allData = mapRowsFromSheet(rows);
      toast(`${allData.length} prospectos cargados`);
    }
  } catch (error) {
    toast('Sin conexión a Sheets', true);
  }

  reconstruirFiltros();
  actualizarKPIs();
  renderCharts();
  filtrarTabla();
}

// ============================================================
// CSV PARSER
// ============================================================
function parseCSV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);

  for (const line of lines) {
    if (!line.trim()) continue;

    const cols = [];
    let cur = '';
    let inQ = false;

    for (let i = 0; i < line.length; i++) {
      const ch = line[i];

      if (ch === '"') {
        if (inQ && line[i + 1] === '"') {
          cur += '"';
          i++;
        } else {
          inQ = !inQ;
        }
      } else if (ch === ',' && !inQ) {
        cols.push(cur);
        cur = '';
      } else {
        cur += ch;
      }
    }

    cols.push(cur);
    rows.push(cols);
  }

  return rows;
}

// ============================================================
// BASIC HELPERS
// ============================================================
function getRow(id) {
  return allData.find(r => r.id === id);
}

function getRowByEmpresa(empresa) {
  return allData.find(r => String(r.empresa || '').trim() === String(empresa || '').trim());
}

function effectiveTel(r) {
  return r.telefono || '';
}

function effectiveCorreo(r) {
  return r.correo || '';
}

function effectiveEtapa(r) {
  return r.etapa || '';
}

function isBaja(r) {
  return String(r.estatus || '').trim().toUpperCase() === 'BAJA';
}

// ============================================================
// KPIS
// ============================================================
function actualizarKPIs() {
  const total = allData.length;
  const baja = allData.filter(r => isBaja(r)).length;
  const activos = total - baja;
  const sinCorreo = allData.filter(r => !isBaja(r) && !effectiveCorreo(r)).length;
  const sinTel = allData.filter(r => !isBaja(r) && !effectiveTel(r)).length;

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiActivos').textContent = activos;
  document.getElementById('kpiBaja').textContent = baja;
  document.getElementById('kpiSinCorreo').textContent = sinCorreo;
  document.getElementById('kpiSinTel').textContent = sinTel;
}

// ============================================================
// CHARTS
// ============================================================
function renderCharts() {
  const activos = allData.filter(r => !isBaja(r));

  const muniMap = {};
  activos.forEach(r => {
    const key = r.municipio || '—';
    muniMap[key] = (muniMap[key] || 0) + 1;
  });

  const sorted = Object.entries(muniMap).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const max = sorted[0]?.[1] || 1;
  const barContainer = document.getElementById('chartMunicipio');

  barContainer.innerHTML = sorted.map(([muni, cnt]) => `
    <div class="bar-row">
      <div class="bar-label" title="${escapeHtml(muni)}">${escapeHtml(muni)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(cnt / max * 100).toFixed(1)}%"></div></div>
      <div class="bar-val">${cnt}</div>
    </div>
  `).join('');

  const estadoMap = {};
  activos.forEach(r => {
    const key = r.estado || '—';
    estadoMap[key] = (estadoMap[key] || 0) + 1;
  });

  const estadoList = Object.entries(estadoMap).sort((a, b) => b[1] - a[1]);
  const colors = ['#0000FA', '#00C96E', '#FFD600', '#FA0028', '#9099AA'];
  const totalD = activos.length || 1;
  let offset = 0;
  const rr = 40, cx = 60, cy = 60;
  const circ = 2 * Math.PI * rr;

  const paths = estadoList.map(([est, cnt], i) => {
    const pct = cnt / totalD;
    const dash = pct * circ;
    const path = `<circle cx="${cx}" cy="${cy}" r="${rr}" fill="none" stroke="${colors[i % colors.length]}" stroke-width="18" stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
    return path;
  }).join('');

  document.getElementById('donutSvg').innerHTML =
    `<circle cx="${cx}" cy="${cy}" r="${rr}" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="18"/>` + paths;

  document.getElementById('donutLegend').innerHTML = estadoList.map(([est, cnt], i) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${colors[i % colors.length]}"></div>
      <span style="color:var(--gray)">${escapeHtml(est)}</span>
      <span style="margin-left:auto;font-family:'Space Mono',monospace;font-size:12px">${cnt}</span>
    </div>
  `).join('');
}

// ============================================================
// FILTERS & SEARCH
// ============================================================
function limpiarFiltros() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterMunicipio').value = '';
  document.getElementById('filterEstado').value = '';
  filtrarTabla();
}

function filtrarTabla() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const muni = document.getElementById('filterMunicipio').value;
  const est = document.getElementById('filterEstado').value;

  let data = allData.filter(r => {
    if (currentTab === 'activos' && isBaja(r)) return false;
    if (currentTab === 'baja' && !isBaja(r)) return false;
    if (currentTab === 'sinCorreo' && (isBaja(r) || effectiveCorreo(r))) return false;
    if (currentTab === 'sinTel' && (isBaja(r) || effectiveTel(r))) return false;
    if (muni && r.municipio !== muni) return false;
    if (est && r.estado !== est) return false;

    if (q) {
      const haystack = [r.empresa, r.nombre, effectiveCorreo(r), r.municipio, r.estado, effectiveTel(r)].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }

    return true;
  });

  if (currentSort.col) {
    data.sort((a, b) => {
      const av = a[currentSort.col] || '';
      const bv = b[currentSort.col] || '';
      return String(av).localeCompare(String(bv)) * currentSort.dir;
    });
  }

  filteredData = data;
  currentPage = 1;
  renderTable();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabs = ['todos', 'activos', 'baja', 'sinCorreo', 'sinTel'];
  const btn = document.querySelectorAll('.tab-btn')[tabs.indexOf(tab)];
  if (btn) btn.classList.add('active');

  selectedIds.clear();
  actualizarBulkBar();
  filtrarTabla();
}

function sortTable(col) {
  if (currentSort.col === col) currentSort.dir *= -1;
  else {
    currentSort.col = col;
    currentSort.dir = 1;
  }
  filtrarTabla();
}

// ============================================================
// TABLE
// ============================================================
function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredData.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tableBody');

  tbody.innerHTML = pageData.map(r => {
    const baja = isBaja(r);
    const tel = effectiveTel(r);
    const correo = effectiveCorreo(r);
    const etapa = effectiveEtapa(r);

    const sinTel = !tel || tel === 'XXX' || tel === '.';
    const sinCorreo = !correo;
    const noContacto = sinTel && sinCorreo;

    let pill = baja
      ? `<span class="status-pill pill-baja">Baja</span>`
      : noContacto
        ? `<span class="status-pill pill-sincontacto">Sin contacto</span>`
        : (sinTel || sinCorreo)
          ? `<span class="status-pill pill-pending">Incompleto</span>`
          : `<span class="status-pill pill-active">Activo</span>`;

    const checked = selectedIds.has(r.id) ? 'checked' : '';

    return `<tr class="${baja ? 'baja' : ''} ${selectedIds.has(r.id) ? 'selected' : ''}" id="row-${r.id}">
      <td><input type="checkbox" class="row-check" ${checked} onchange="toggleRow(${r.id},this)"></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;font-weight:700;">${escapeHtml(r.empresa)}</td>
      <td>${escapeHtml(r.estado)}</td>
      <td>${escapeHtml(r.municipio)}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(r.nombre)}</td>
      <td>${tel ? `<span class="has-data">${escapeHtml(tel)}</span>` : `<span class="no-data">Sin teléfono</span>`}</td>
      <td>${correo ? `<span class="has-data" style="font-size:13px;">${escapeHtml(correo)}</span>` : `<span class="no-data">Sin correo</span>`}</td>
      <td>${etapa ? `<span style="font-size:12px;color:var(--blue)">${escapeHtml(etapa)}</span>` : '<span style="color:var(--gray);font-size:12px;">—</span>'}</td>
      <td>${pill}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="abrirDrawer(${r.id})">Ver</button>
          <button class="btn btn-warning btn-sm" onclick="abrirEditar(${r.id})">Editar</button>
          ${baja
            ? `<button class="btn btn-success btn-sm" onclick="reactivar(${r.id})">Reactivar</button>`
            : `<button class="btn btn-danger btn-sm" onclick="abrirBaja(${r.id})">Baja</button>`
          }
        </div>
      </td>
    </tr>`;
  }).join('');

  if (!pageData.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--gray);">Sin registros para mostrar</td></tr>`;
  }

  renderPager();
  document.getElementById('checkAll').checked = false;
}

// ============================================================
// PAGER
// ============================================================
function renderPager() {
  const total = filteredData.length;
  const pages = Math.ceil(total / PAGE_SIZE) || 1;
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, total);

  document.getElementById('pagerInfo').textContent = `Mostrando ${total ? start : 0}-${end} de ${total} registros`;

  const btns = document.getElementById('pagerBtns');
  let html = `<button class="pager-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

  for (let p = 1; p <= pages; p++) {
    if (pages > 7 && Math.abs(p - currentPage) > 2 && p !== 1 && p !== pages) {
      if (p === currentPage - 3 || p === currentPage + 3) {
        html += `<span style="color:var(--gray);padding:5px">…</span>`;
      }
      continue;
    }
    html += `<button class="pager-btn ${p === currentPage ? 'active-page' : ''}" onclick="goPage(${p})">${p}</button>`;
  }

  html += `<button class="pager-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>›</button>`;
  btns.innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filteredData.length / PAGE_SIZE) || 1;
  currentPage = Math.max(1, Math.min(p, pages));
  renderTable();
}

// ============================================================
// SELECTION
// ============================================================
function toggleRow(id, cb) {
  if (cb.checked) selectedIds.add(id);
  else selectedIds.delete(id);

  const row = document.getElementById('row-' + id);
  if (row) row.classList.toggle('selected', cb.checked);

  actualizarBulkBar();
}

function toggleAll(cb) {
  const start = (currentPage - 1) * PAGE_SIZE;
  filteredData.slice(start, start + PAGE_SIZE).forEach(r => {
    if (cb.checked) selectedIds.add(r.id);
    else selectedIds.delete(r.id);
  });

  renderTable();
  actualizarBulkBar();
}

function actualizarBulkBar() {
  const bar = document.getElementById('bulkBar');
  if (selectedIds.size > 0) {
    bar.classList.add('visible');
    document.getElementById('bulkCount').textContent = selectedIds.size;
  } else {
    bar.classList.remove('visible');
  }
}

function deseleccionarTodo() {
  selectedIds.clear();
  actualizarBulkBar();
  renderTable();
}

// ============================================================
// BAJA
// ============================================================
function abrirBaja(id) {
  pendingBajaId = id;
  const r = getRow(id);
  document.getElementById('modalEmpresaNombre').textContent = r.empresa;
  document.getElementById('motivoBaja').value = 'Correo inválido / inexistente';
  document.getElementById('notasBaja').value = '';
  document.getElementById('modalBaja').classList.add('open');
}

function cerrarModal() {
  document.getElementById('modalBaja').classList.remove('open');
  pendingBajaId = null;
}

async function confirmarBaja() {
  if (!pendingBajaId) return;

  const row = getRow(pendingBajaId);
  const motivo = document.getElementById('motivoBaja').value;
  const notas = document.getElementById('notasBaja').value;

  try {
    await postToAppsScript({
      action: 'darBaja',
      empresa: row.empresa,
      nombre: row.nombre,
      correo: row.correo,
      telefono: row.telefono,
      motivo,
      notas
    });

    cerrarModal();
    cerrarDetalle();
    await recargarSheets(false);
    toast(`Prospecto dado de baja: ${motivo}`, true);
  } catch (error) {
    toast(error.message || 'No se pudo dar de baja', true);
  }
}

async function reactivar(id) {
  const row = getRow(id);

  try {
    await postToAppsScript({
      action: 'reactivar',
      empresa: row.empresa,
      nombre: row.nombre,
      correo: row.correo,
      telefono: row.telefono
    });

    cerrarDetalle();
    await recargarSheets(false);
    toast('Prospecto reactivado');
  } catch (error) {
    toast(error.message || 'No se pudo reactivar', true);
  }
}

async function bajaSeleccionados() {
  if (!selectedIds.size) return;

  try {
    for (const id of selectedIds) {
      const row = getRow(id);
      await postToAppsScript({
        action: 'darBaja',
        empresa: row.empresa,
        nombre: row.nombre,
        correo: row.correo,
        telefono: row.telefono,
        motivo: 'Baja masiva',
        notas: ''
      });
    }

    selectedIds.clear();
    actualizarBulkBar();
    await recargarSheets(false);
    toast('Prospectos dados de baja', true);
  } catch (error) {
    toast(error.message || 'No se pudo completar la baja masiva', true);
  }
}

async function reactivarSeleccionados() {
  if (!selectedIds.size) return;

  try {
    for (const id of selectedIds) {
      const row = getRow(id);
      await postToAppsScript({
        action: 'reactivar',
        empresa: row.empresa,
        nombre: row.nombre,
        correo: row.correo,
        telefono: row.telefono
      });
    }

    selectedIds.clear();
    actualizarBulkBar();
    await recargarSheets(false);
    toast('Prospectos reactivados');
  } catch (error) {
    toast(error.message || 'No se pudo completar la reactivación masiva', true);
  }
}

// ============================================================
// EDIT
// ============================================================
function abrirEditar(id) {
  pendingEditId = id;
  const r = getRow(id);

  document.getElementById('editTel').value = r.telefono || '';
  document.getElementById('editCorreo').value = r.correo || '';
  document.getElementById('editEtapa').value = r.etapa || '1-Primer contacto';
  document.getElementById('editNotas').value = r.observaciones || '';
  document.getElementById('modalEditar').classList.add('open');
}

function cerrarModalEditar() {
  document.getElementById('modalEditar').classList.remove('open');
  pendingEditId = null;
}

async function confirmarEditar() {
  if (!pendingEditId) return;

  const row = getRow(pendingEditId);
  const telefono = document.getElementById('editTel').value.trim();
  const correo = document.getElementById('editCorreo').value.trim();
  const etapa = document.getElementById('editEtapa').value;
  const notas = document.getElementById('editNotas').value.trim();

  try {
    await postToAppsScript({
      action: 'editar',
      original: {
        empresa: row.empresa,
        nombre: row.nombre,
        correo: row.correo,
        telefono: row.telefono
      },
      telefono,
      correo,
      etapa,
      notas
    });

    cerrarModalEditar();
    cerrarDetalle();
    await recargarSheets(false);
    toast('Cambios guardados');
  } catch (error) {
    toast(error.message || 'No se pudo editar', true);
  }
}

// ============================================================
// AÑADIR
// ============================================================
function abrirAnadir() {
  ['newEmpresa','newEstado','newMunicipio','newNombre','newTel','newCorreo','newNotas'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('newEtapa').value = '';
  document.getElementById('newFuente').value = 'MANUAL';
  document.getElementById('modalAnadir').classList.add('open');
}

function cerrarAnadir() {
  document.getElementById('modalAnadir').classList.remove('open');
}

async function confirmarAnadir() {
  const empresa = document.getElementById('newEmpresa').value.trim();

  if (!empresa) {
    toast('El nombre de la empresa es obligatorio', true);
    return;
  }

  const payload = {
    action: 'anadir',
    empresa: empresa.toUpperCase(),
    estado: (document.getElementById('newEstado').value.trim() || 'MEXICO').toUpperCase(),
    municipio: (document.getElementById('newMunicipio').value.trim() || '—').toUpperCase(),
    nombre: document.getElementById('newNombre').value.trim() || '—',
    telefono: document.getElementById('newTel').value.trim(),
    correo: document.getElementById('newCorreo').value.trim(),
    etapa: document.getElementById('newEtapa').value,
    fuente: (document.getElementById('newFuente').value.trim() || 'MANUAL').toUpperCase(),
    notas: document.getElementById('newNotas').value.trim()
  };

  try {
    await postToAppsScript(payload);
    cerrarAnadir();
    await recargarSheets(false);
    toast(`Empresa "${payload.empresa}" agregada`);
  } catch (error) {
    toast(error.message || 'No se pudo agregar la empresa', true);
  }
}

// ============================================================
// DETAIL
// ============================================================
function verDetalle(id) {
  const r = getRow(id);
  const baja = isBaja(r);

  const fields = [
    { label: 'Empresa', val: escapeHtml(r.empresa) },
    { label: 'Estado', val: escapeHtml(r.estado) },
    { label: 'Municipio', val: escapeHtml(r.municipio) },
    { label: 'Nombre contacto', val: escapeHtml(r.nombre) },
    { label: 'Teléfono', val: effectiveTel(r) ? escapeHtml(effectiveTel(r)) : '<span class="no-data">Sin teléfono</span>' },
    { label: 'Correo', val: effectiveCorreo(r) ? escapeHtml(effectiveCorreo(r)) : '<span class="no-data">Sin correo</span>' },
    { label: 'Etapa', val: effectiveEtapa(r) ? escapeHtml(effectiveEtapa(r)) : '—' },
    { label: 'Fuente BD', val: escapeHtml(r.fuente) },
    { label: 'Estatus', val: baja ? '<span class="status-pill pill-baja">Baja</span>' : '<span class="status-pill pill-active">Activo</span>' },
    { label: 'Motivo de baja', val: escapeHtml(r.motivoBaja || '—') },
    { label: 'Notas', val: escapeHtml(r.observaciones || '—') }
  ];

  document.getElementById('detailGrid').innerHTML = fields.map(f => `
    <div class="detail-field">
      <label>${f.label}</label>
      <span>${f.val}</span>
    </div>
  `).join('');

  document.getElementById('detailActions').innerHTML = `
    <button class="btn btn-warning btn-sm" onclick="abrirEditar(${id})">Editar</button>
    ${baja
      ? `<button class="btn btn-success btn-sm" onclick="reactivar(${id})">Reactivar</button>`
      : `<button class="btn btn-danger btn-sm" onclick="abrirBaja(${id})">Dar de Baja</button>`
    }
  `;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailPanel').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function cerrarDetalle() {
  document.getElementById('detailPanel').classList.remove('open');
}

// ============================================================
// DRAWER
// ============================================================
async function abrirDrawer(id) {
  const r = getRow(id);
  if (!r) return;

  drawerEmpresaActual = r.empresa;

  document.getElementById('drawerEmpresaNombre').textContent = r.empresa;
  document.getElementById('drawerAsignado').value = r.asignado || '';
  document.getElementById('drawerEtapa').value = r.etapa || '';
  document.getElementById('drawerNotasList').innerHTML = '<div class="drawer-empty">Cargando...</div>';
  document.getElementById('drawerArchivosList').innerHTML = '<div class="drawer-empty">Cargando...</div>';
  document.getElementById('nuevaNota').value = '';
  document.getElementById('nuevaNotaUsuario').value = '';
  document.getElementById('nuevoArchivoNombre').value = '';
  document.getElementById('nuevoArchivoURL').value = '';

  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawerPanel').classList.add('open');

  try {
    const [detalle, notas, archivos] = await Promise.all([
      getFromAppsScript('getDetalleEmpresa', { empresa: r.empresa }),
      getFromAppsScript('getSeguimiento', { empresa: r.empresa }),
      getFromAppsScript('getArchivos', { empresa: r.empresa })
    ]);

    if (detalle) {
      document.getElementById('drawerAsignado').value = detalle.asignado && detalle.asignado !== '—' ? detalle.asignado : '';
      document.getElementById('drawerEtapa').value = detalle.etapa && detalle.etapa !== '—' ? detalle.etapa : (r.etapa || '');
    }

    renderDrawerNotas(Array.isArray(notas) ? notas : []);
    renderDrawerArchivos(Array.isArray(archivos) ? archivos : []);
  } catch (error) {
    document.getElementById('drawerNotasList').innerHTML = '<div class="drawer-empty">Error al cargar notas</div>';
    document.getElementById('drawerArchivosList').innerHTML = '<div class="drawer-empty">Error al cargar archivos</div>';
    toast(error.message || 'Error al cargar datos del panel', true);
  }
}

function cerrarDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawerPanel').classList.remove('open');
  drawerEmpresaActual = null;
}

function renderDrawerNotas(notas) {
  document.getElementById('drawerNotasCount').textContent = notas.length;

  if (!notas.length) {
    document.getElementById('drawerNotasList').innerHTML = '<div class="drawer-empty">Sin notas aún</div>';
    return;
  }

  document.getElementById('drawerNotasList').innerHTML = [...notas].reverse().map(n => `
    <div class="nota-item">
      <div class="nota-meta">${escapeHtml(n.fecha || '')} · ${escapeHtml(n.usuario || '—')}</div>
      <div class="nota-text">${escapeHtml(n.nota || '')}</div>
    </div>
  `).join('');
}

function renderDrawerArchivos(archivos) {
  document.getElementById('drawerArchivosCount').textContent = archivos.length;

  if (!archivos.length) {
    document.getElementById('drawerArchivosList').innerHTML = '<div class="drawer-empty">Sin archivos aún</div>';
    return;
  }

  document.getElementById('drawerArchivosList').innerHTML = [...archivos].reverse().map(a => {
    const url = String(a.url || '').trim();
    const safeUrl = url ? encodeURI(url) : '#';

    return `
      <div class="archivo-item">
        <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">📄 ${escapeHtml(a.nombre || 'Archivo')}</a>
        <span class="archivo-fecha">${escapeHtml(a.fecha || '')}</span>
      </div>
    `;
  }).join('');
}

async function guardarAsignadoEtapa() {
  if (!drawerEmpresaActual) return;

  const asignado = document.getElementById('drawerAsignado').value.trim();
  const etapa = document.getElementById('drawerEtapa').value;

  try {
    await postToAppsScript({
      action: 'updateAsignadoEtapa',
      empresa: drawerEmpresaActual,
      asignado,
      etapa
    });

    const localRow = getRowByEmpresa(drawerEmpresaActual);
    if (localRow) {
      localRow.asignado = asignado;
      localRow.etapa = etapa;
    }

    await recargarSheets(false);

    if (drawerEmpresaActual) {
      const rowReloaded = getRowByEmpresa(drawerEmpresaActual);
      if (rowReloaded) {
        document.getElementById('drawerEtapa').value = rowReloaded.etapa || '';
      }
    }

    toast('Asignado y etapa guardados');
  } catch (error) {
    toast(error.message || 'Error al guardar', true);
  }
}

async function agregarNota() {
  if (!drawerEmpresaActual) return;

  const nota = document.getElementById('nuevaNota').value.trim();
  const usuario = document.getElementById('nuevaNotaUsuario').value.trim() || 'Usuario';

  if (!nota) {
    toast('Escribe una nota primero', true);
    return;
  }

  try {
    await postToAppsScript({
      action: 'addNota',
      empresa: drawerEmpresaActual,
      nota,
      usuario
    });

    document.getElementById('nuevaNota').value = '';
    toast('Nota agregada');

    const notas = await getFromAppsScript('getSeguimiento', { empresa: drawerEmpresaActual });
    renderDrawerNotas(Array.isArray(notas) ? notas : []);
  } catch (error) {
    toast(error.message || 'Error al agregar nota', true);
  }
}

async function agregarArchivo() {
  if (!drawerEmpresaActual) return;

  const nombre = document.getElementById('nuevoArchivoNombre').value.trim();
  const url = document.getElementById('nuevoArchivoURL').value.trim();

  if (!nombre || !url) {
    toast('Nombre y URL son obligatorios', true);
    return;
  }

  try {
    await postToAppsScript({
      action: 'addArchivo',
      empresa: drawerEmpresaActual,
      nombre,
      url
    });

    document.getElementById('nuevoArchivoNombre').value = '';
    document.getElementById('nuevoArchivoURL').value = '';
    toast('Archivo agregado');

    const archivos = await getFromAppsScript('getArchivos', { empresa: drawerEmpresaActual });
    renderDrawerArchivos(Array.isArray(archivos) ? archivos : []);
  } catch (error) {
    toast(error.message || 'Error al agregar archivo', true);
  }
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, danger = false) {
  const div = document.createElement('div');
  div.className = 'toast' + (danger ? ' danger' : '');
  div.textContent = msg;
  document.getElementById('toastWrap').appendChild(div);
  setTimeout(() => div.remove(), 3100);
}

// ============================================================
// EXPORT CSV
// ============================================================
function exportarCSV() {
  const headers = ['ID','Empresa','Estado','Municipio','Nombre','Teléfono','Correo','Etapa','Estatus','Motivo Baja','Notas'];

  const rows = filteredData.map(r => {
    return [
      r.id,
      r.empresa,
      r.estado,
      r.municipio,
      r.nombre,
      effectiveTel(r),
      effectiveCorreo(r),
      effectiveEtapa(r),
      isBaja(r) ? 'Baja' : 'Activo',
      r.motivoBaja || '',
      r.observaciones || ''
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
  });

  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'prospeccion_cdmx_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  toast('CSV exportado');
}
